<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beslenme Programları Yönetimi - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
  <script src="../js/config.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/app.js"></script>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="admin-sidebar">
            <div class="sidebar-header">
                <h4 class="mb-0 fw-bold">Admin Panel</h4>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="index.html"><i class="bi bi-images me-2"></i>Hero Slider</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="nutrition.html"><i class="bi bi-heart-pulse me-2"></i>Beslenme</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="blog.html"><i class="bi bi-journal-richtext me-2"></i>Blog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="gallery.html"><i class="bi bi-card-image me-2"></i>Galeri</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="recipes.html"><i class="bi bi-egg-fried me-2"></i>Tarifler</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="appointments.html"><i class="bi bi-calendar-check me-2"></i>Randevular</a>
                </li>
                <li><hr class="dropdown-divider mx-3"></li>
                <li class="nav-item">
                    <a class="nav-link" href="../pages/index.html"><i class="bi bi-house me-2"></i>Ana Sayfa</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="#" onclick="adminLogout()"><i class="bi bi-box-arrow-right me-2"></i>Çıkış</a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="fw-bold mb-1">Beslenme Programları Yönetimi</h2>
                    <p class="text-muted mb-0">Beslenme programlarını yönetin</p>
                </div>
                <button class="btn btn-primary-custom" onclick="openAddModal()">
                    <i class="bi bi-plus-lg me-2"></i>Yeni Program Ekle
                </button>
            </div>

            <div id="nutritionList" class="row g-4 mt-2">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2 text-muted">Yükleniyor...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="nutritionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Yeni Beslenme Programı</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="nutritionForm">
                        <input type="hidden" id="nutritionId">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-medium">Başlık</label>
                                <input type="text" class="form-control" id="nutritionTitle" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium">Açıklama</label>
                                <textarea class="form-control" id="nutritionDescription" rows="5"></textarea>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-medium">Görsel</label>
                                <input type="file" class="form-control" id="nutritionImage" accept="image/*">
                                <div id="currentImage" class="mt-2 d-none">
                                    <small class="text-muted">Mevcut görsel:</small>
                                    <img id="currentImagePreview" src="" class="d-block mt-1 rounded" style="max-height: 100px;" onerror="imgError(this)">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-medium">Sıra</label>
                                <input type="number" class="form-control" id="nutritionOrder" value="0">
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="nutritionIsActive" checked>
                                    <label class="form-check-label fw-medium" for="nutritionIsActive">Aktif</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button type="button" class="btn btn-primary-custom" onclick="saveNutrition()">
                        <i class="bi bi-check-lg me-1"></i>Kaydet
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let nutritionModal;

        document.addEventListener('DOMContentLoaded', () => {
            nutritionModal = new bootstrap.Modal(document.getElementById('nutritionModal'));
            loadNutrition();
        });

        async function loadNutrition() {
            try {
                const programs = await api('/NutritionProgram/All');
                const container = document.getElementById('nutritionList');

                if (!programs || programs.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <i class="bi bi-heart-pulse" style="font-size: 3rem; color: #ccc;"></i>
                            <p class="mt-2 text-muted">Henüz beslenme programı eklenmemiş</p>
                        </div>`;
                    return;
                }

                container.innerHTML = programs.map(p => `
                    <div class="col-md-6 col-lg-4">
                        <div class="card-modern h-100">
                            <div class="position-relative">
                                <img src="${imgUrl(p.imageUrl || p.imagePath)}"
                                     class="card-img-top"
                                     style="height: 200px; object-fit: cover;"
                                     alt="${p.title}"
                                     onerror="imgError(this)">
                                <span class="badge ${p.isActive ? 'bg-success' : 'bg-secondary'} position-absolute top-0 end-0 m-2">
                                    ${p.isActive ? 'Aktif' : 'Pasif'}
                                </span>
                                <span class="badge bg-dark position-absolute top-0 start-0 m-2">
                                    Sıra: ${p.order ?? 0}
                                </span>
                            </div>
                            <div class="card-body">
                                <h5 class="card-title fw-bold">${p.title}</h5>
                                <p class="card-text text-muted small">${(p.description || '').substring(0, 120)}${(p.description || '').length > 120 ? '...' : ''}</p>
                            </div>
                            <div class="card-footer bg-transparent border-0 d-flex gap-2 pb-3 px-3">
                                <button class="btn btn-sm btn-outline-primary flex-fill" onclick="editNutrition(${p.id})">
                                    <i class="bi bi-pencil me-1"></i>Düzenle
                                </button>
                                <button class="btn btn-sm btn-outline-danger flex-fill" onclick="deleteNutrition(${p.id})">
                                    <i class="bi bi-trash me-1"></i>Sil
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('nutritionList').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>Veriler yüklenirken hata oluştu.</div>
                    </div>`;
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Yeni Beslenme Programı';
            document.getElementById('nutritionForm').reset();
            document.getElementById('nutritionId').value = '';
            document.getElementById('nutritionIsActive').checked = true;
            document.getElementById('currentImage').classList.add('d-none');
            nutritionModal.show();
        }

        async function editNutrition(id) {
            try {
                const p = await api('/NutritionProgram/' + id);
                document.getElementById('modalTitle').textContent = 'Program Düzenle';
                document.getElementById('nutritionId').value = p.id;
                document.getElementById('nutritionTitle').value = p.title || '';
                document.getElementById('nutritionDescription').value = p.description || '';
                document.getElementById('nutritionOrder').value = p.order ?? 0;
                document.getElementById('nutritionIsActive').checked = p.isActive;
                document.getElementById('nutritionImage').value = '';

                if (p.imageUrl || p.imagePath) {
                    document.getElementById('currentImage').classList.remove('d-none');
                    document.getElementById('currentImagePreview').src = imgUrl(p.imageUrl || p.imagePath);
                } else {
                    document.getElementById('currentImage').classList.add('d-none');
                }

                nutritionModal.show();
            } catch (error) {
                alert('Program bilgileri yüklenirken hata oluştu.');
            }
        }

        async function saveNutrition() {
            const id = document.getElementById('nutritionId').value;

            var imageUrlValue = '';
            const imageFile = document.getElementById('nutritionImage').files[0];
            if (imageFile) {
                var result = await apiUpload(imageFile);
                imageUrlValue = result.imageUrl;
            }

            var data = {
                title: document.getElementById('nutritionTitle').value,
                description: document.getElementById('nutritionDescription').value,
                order: parseInt(document.getElementById('nutritionOrder').value) || 0,
                isActive: document.getElementById('nutritionIsActive').checked
            };

            if (imageUrlValue) {
                data.imageUrl = imageUrlValue;
            } else if (id) {
                var currentSrc = document.getElementById('currentImagePreview').src;
                if (currentSrc) {
                    data.imageUrl = currentSrc.replace(imgUrl(''), '');
                }
            }

            try {
                if (id) {
                    data.id = parseInt(id);
                    await api('/NutritionProgram/' + id, { method: 'PUT', body: JSON.stringify(data) });
                } else {
                    await api('/NutritionProgram', { method: 'POST', body: JSON.stringify(data) });
                }
                nutritionModal.hide();
                loadNutrition();
            } catch (error) {
                alert('Kaydetme sırasında hata oluştu: ' + (error.message || error));
            }
        }

        async function deleteNutrition(id) {
            if (!confirm('Bu beslenme programını silmek istediğinizden emin misiniz?')) return;
            try {
                await api('/NutritionProgram/' + id, { method: 'DELETE' });
                loadNutrition();
            } catch (error) {
                alert('Silme sırasında hata oluştu.');
            }
        }
    </script>
</body>
</html>
