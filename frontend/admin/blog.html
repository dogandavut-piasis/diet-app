<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Yönetimi - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
  <script src="../js/config.js"></script>
  <script src="../js/admin-auth.js"></script>
  <script src="../js/app.js"></script>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <nav class="admin-sidebar">
            <div class="sidebar-header">
                <h4 class="mb-0 fw-bold">Admin Panel</h4>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="index.html"><i class="bi bi-images me-2"></i>Hero Slider</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="nutrition.html"><i class="bi bi-heart-pulse me-2"></i>Beslenme</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="blog.html"><i class="bi bi-journal-richtext me-2"></i>Blog</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="gallery.html"><i class="bi bi-card-image me-2"></i>Galeri</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="recipes.html"><i class="bi bi-egg-fried me-2"></i>Tarifler</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="appointments.html"><i class="bi bi-calendar-check me-2"></i>Randevular</a>
                </li>
                <li><hr class="dropdown-divider mx-3"></li>
                <li class="nav-item">
                    <a class="nav-link" href="../pages/index.html"><i class="bi bi-house me-2"></i>Ana Sayfa</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="#" onclick="adminLogout()"><i class="bi bi-box-arrow-right me-2"></i>Çıkış</a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-header d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="fw-bold mb-1">Blog Yönetimi</h2>
                    <p class="text-muted mb-0">Blog yazılarınızı yönetin</p>
                </div>
                <button class="btn btn-primary-custom" onclick="openAddModal()">
                    <i class="bi bi-plus-lg me-2"></i>Yeni Yazı Ekle
                </button>
            </div>

            <div class="table-responsive mt-4">
                <table class="table-modern">
                    <thead>
                        <tr>
                            <th>Görsel</th>
                            <th>Başlık</th>
                            <th>Yazar</th>
                            <th>Tarih</th>
                            <th>Durum</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="blogTableBody">
                        <tr>
                            <td colspan="6" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                                <p class="mt-2 text-muted mb-0">Yükleniyor...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="blogModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Yeni Blog Yazısı</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="blogForm">
                        <input type="hidden" id="blogId">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label fw-medium">Başlık</label>
                                <input type="text" class="form-control" id="blogTitle" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-medium">Yazar</label>
                                <input type="text" class="form-control" id="blogAuthor">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium">Özet</label>
                                <input type="text" class="form-control" id="blogExcerpt">
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium">İçerik</label>
                                <textarea class="form-control" id="blogContent" rows="8" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Görsel</label>
                                <input type="file" class="form-control" id="blogImage" accept="image/*">
                                <div id="currentImage" class="mt-2 d-none">
                                    <small class="text-muted">Mevcut görsel:</small>
                                    <img id="currentImagePreview" src="" class="d-block mt-1 rounded" style="max-height: 80px;" onerror="imgError(this)">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Yayın Tarihi</label>
                                <input type="datetime-local" class="form-control" id="blogPublishedDate">
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="blogIsPublished" checked>
                                    <label class="form-check-label fw-medium" for="blogIsPublished">Yayında</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
                    <button type="button" class="btn btn-primary-custom" onclick="saveBlog()">
                        <i class="bi bi-check-lg me-1"></i>Kaydet
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let blogModal;

        document.addEventListener('DOMContentLoaded', () => {
            blogModal = new bootstrap.Modal(document.getElementById('blogModal'));
            loadBlogs();
        });

        async function loadBlogs() {
            try {
                const posts = await api('/BlogPost/All');
                const tbody = document.getElementById('blogTableBody');

                if (!posts || posts.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center py-5 text-muted">Henüz blog yazısı eklenmemiş</td></tr>`;
                    return;
                }

                tbody.innerHTML = posts.map(post => `
                    <tr>
                        <td>
                            <img src="${imgUrl(post.imageUrl || post.imagePath)}"
                                 style="width: 60px; height: 40px; object-fit: cover; border-radius: 6px;"
                                 onerror="imgError(this)">
                        </td>
                        <td class="fw-medium">${post.title}</td>
                        <td>${post.author || '-'}</td>
                        <td>${post.publishedDate ? new Date(post.publishedDate).toLocaleDateString('tr-TR') : '-'}</td>
                        <td>
                            <span class="badge ${post.isPublished ? 'bg-success' : 'bg-secondary'}">
                                ${post.isPublished ? 'Yayında' : 'Taslak'}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="editBlog(${post.id})">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteBlog(${post.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('blogTableBody').innerHTML = `
                    <tr><td colspan="6" class="text-center py-4">
                        <div class="alert alert-danger mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Veriler yüklenirken hata oluştu.</div>
                    </td></tr>`;
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Yeni Blog Yazısı';
            document.getElementById('blogForm').reset();
            document.getElementById('blogId').value = '';
            document.getElementById('blogIsPublished').checked = true;
            document.getElementById('currentImage').classList.add('d-none');
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('blogPublishedDate').value = now.toISOString().slice(0, 16);
            blogModal.show();
        }

        async function editBlog(id) {
            try {
                const post = await api('/BlogPost/' + id);
                document.getElementById('modalTitle').textContent = 'Blog Yazısı Düzenle';
                document.getElementById('blogId').value = post.id;
                document.getElementById('blogTitle').value = post.title || '';
                document.getElementById('blogAuthor').value = post.author || '';
                document.getElementById('blogExcerpt').value = post.excerpt || '';
                document.getElementById('blogContent').value = post.content || '';
                document.getElementById('blogIsPublished').checked = post.isPublished;
                document.getElementById('blogImage').value = '';

                if (post.publishedDate) {
                    const d = new Date(post.publishedDate);
                    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                    document.getElementById('blogPublishedDate').value = d.toISOString().slice(0, 16);
                }

                if (post.imageUrl || post.imagePath) {
                    document.getElementById('currentImage').classList.remove('d-none');
                    document.getElementById('currentImagePreview').src = imgUrl(post.imageUrl || post.imagePath);
                } else {
                    document.getElementById('currentImage').classList.add('d-none');
                }

                blogModal.show();
            } catch (error) {
                alert('Blog bilgileri yüklenirken hata oluştu.');
            }
        }

        async function saveBlog() {
            const id = document.getElementById('blogId').value;

            var imageUrlValue = '';
            const imageFile = document.getElementById('blogImage').files[0];
            if (imageFile) {
                var result = await apiUpload(imageFile);
                imageUrlValue = result.imageUrl;
            }

            var data = {
                title: document.getElementById('blogTitle').value,
                author: document.getElementById('blogAuthor').value,
                excerpt: document.getElementById('blogExcerpt').value,
                content: document.getElementById('blogContent').value,
                publishedDate: document.getElementById('blogPublishedDate').value,
                isPublished: document.getElementById('blogIsPublished').checked
            };

            if (imageUrlValue) {
                data.imageUrl = imageUrlValue;
            } else if (id) {
                var currentSrc = document.getElementById('currentImagePreview').src;
                if (currentSrc) {
                    data.imageUrl = currentSrc.replace(imgUrl(''), '');
                }
            }

            try {
                if (id) {
                    data.id = parseInt(id);
                    await api('/BlogPost/' + id, { method: 'PUT', body: JSON.stringify(data) });
                } else {
                    await api('/BlogPost', { method: 'POST', body: JSON.stringify(data) });
                }
                blogModal.hide();
                loadBlogs();
            } catch (error) {
                alert('Kaydetme sırasında hata oluştu: ' + (error.message || error));
            }
        }

        async function deleteBlog(id) {
            if (!confirm('Bu blog yazısını silmek istediğinizden emin misiniz?')) return;
            try {
                await api('/BlogPost/' + id, { method: 'DELETE' });
                loadBlogs();
            } catch (error) {
                alert('Silme sırasında hata oluştu.');
            }
        }
    </script>
</body>
</html>
